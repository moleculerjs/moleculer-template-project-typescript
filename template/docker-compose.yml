services:

{{#monolith}}
  services:
    build:
      context: .
    image: {{projectName}}
    env_file: docker-compose.env
    {{#apiGW}}
    environment:
      PORT: 3000
    {{/apiGW}}
{{#hasDepends}}
    depends_on:
{{#nats}}
      - nats
{{/nats}}
{{#redis}}
      - redis
{{/redis}}
{{#rabbitmq}}
      - rabbitmq
{{/rabbitmq}}
{{#kafka}}
      - zookeeper
{{/kafka}}
{{/hasDepends}}
{{#apiGW}}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api-gw.rule=PathPrefix(`/`)"
      - "traefik.http.services.api-gw.loadbalancer.server.port=3000"
{{/apiGW}}
    networks:
      - internal
{{/monolith}}

{{#unless monolith}}

{{#apiGW}}
  api:
    build:
      context: .
    image: {{projectName}}
    env_file: docker-compose.env
    environment:
      SERVICES: api
      PORT: 3000
{{#hasDepends}}
    depends_on:
{{#nats}}
      - nats
{{/nats}}
{{#redis}}
      - redis
{{/redis}}
{{#if_eq transporter "MQTT"}}
      - mqtt
{{/if_eq}}
{{#rabbitmq}}
      - rabbitmq
{{/rabbitmq}}
{{#if_eq transporter "AMQP10"}}
      - activemq
{{/if_eq}}
{{#kafka}}
      - zookeeper
{{/kafka}}
{{/hasDepends}}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api-gw.rule=PathPrefix(`/`)"
      - "traefik.http.services.api-gw.loadbalancer.server.port=3000"
    networks:
      - internal
{{/apiGW}}


  greeter:
    build:
      context: .
    image: {{projectName}}
    env_file: docker-compose.env
    environment:
      SERVICES: greeter
{{#hasDepends}}
    depends_on:
{{#nats}}
      - nats
{{/nats}}
{{#redis}}
      - redis
{{/redis}}
{{#if_eq transporter "MQTT"}}
      - mqtt
{{/if_eq}}
{{#rabbitmq}}
      - rabbitmq
{{/rabbitmq}}
{{#if_eq transporter "AMQP10"}}
      - activemq
{{/if_eq}}
{{#kafka}}
      - zookeeper
{{/kafka}}
{{/hasDepends}}
    networks:
      - internal

{{#needChannels}}
  inventory:
    build:
      context: .
    image: {{projectName}}
    env_file: docker-compose.env
    environment:
      SERVICES: inventory
    depends_on:
{{#nats}}
      - nats
{{/nats}}
{{#redis}}
      - redis
{{/redis}}
{{#rabbitmq}}
      - rabbitmq
{{/rabbitmq}}
{{#kafka}}
      - zookeeper
{{/kafka}}
    networks:
      - internal
{{/needChannels}}

{{#needWorkflows}}
  orders:
    build:
      context: .
    image: {{projectName}}
    env_file: docker-compose.env
    environment:
      SERVICES: orders
    depends_on:
{{#nats}}
      - nats
{{/nats}}
{{#redis}}
      - redis
{{/redis}}
{{#rabbitmq}}
      - rabbitmq
{{/rabbitmq}}
{{#kafka}}
      - zookeeper
{{/kafka}}
    networks:
      - internal
{{/needWorkflows}}

{{#dbService}}
  products:
    build:
      context: .
    image: {{projectName}}
    env_file: docker-compose.env
    environment:
      SERVICES: products
    depends_on:
      - mongo
{{#nats}}
      - nats
{{/nats}}
{{#redis}}
      - redis
{{/redis}}
{{#if_eq transporter "MQTT"}}
      - mqtt
{{/if_eq}}
{{#rabbitmq}}
      - rabbitmq
{{/rabbitmq}}
{{#if_eq transporter "AMQP10"}}
      - activemq
{{/if_eq}}
{{#kafka}}
      - zookeeper
{{/kafka}}
    networks:
      - internal

  mongo:
    image: mongo:6
    volumes:
      - data:/data/db
    networks:
      - internal
{{/dbService}}
{{/unless}}
{{#nats}}

  nats:
    image: nats:2
    networks:
      - internal
{{/nats}}
{{#redis}}

  redis:
    image: redis:alpine
    networks:
      - internal
{{/redis}}
{{#if_eq transporter "MQTT"}}

  mqtt:
    image: ncarlier/mqtt
    networks:
      - internal
{{/if_eq}}
{{#rabbitmq}}

  rabbitmq:
    image: rabbitmq:3
    networks:
      - internal
{{/rabbitmq}}
{{#if_eq transporter "AMQP10"}}

  activemq:
    image: rmohr/activemq
    networks:
      - internal
{{/if_eq}}
{{#kafka}}

  zookeeper:
    image: bitnami/zookeeper:3.9
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
    networks:
      - internal

  kafka:
    image: bitnami/kafka:3.9
    environment:
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - ALLOW_PLAINTEXT_LISTENER=yes
    depends_on:
      - zookeeper
    networks:
      - internal
{{/kafka}}

{{#apiGW}}
  traefik:
    image: traefik:v2.4
    command:
      - "--api.insecure=true" # Don't do that in production!
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
    ports:
      - 3000:80
      - 3001:8080
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - internal
      - default
{{/apiGW}}

networks:
  internal:
{{#dbService}}
volumes:
  data:
{{/dbService}}
